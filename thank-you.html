<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شكراً لك! | CHIZEL</title>
    <meta name="description" content="تم استلام طلبك بنجاح. شكراً لثقتك بـ CHIZEL.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .thank-you-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--cream) 0%, var(--white) 100%);
            padding: 2rem;
        }
        
        .thank-you-card {
            background: var(--white);
            border-radius: 24px;
            padding: 3rem 2rem;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(201, 162, 39, 0.2);
        }
        
        .success-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            animation: scaleIn 0.5s ease;
        }
        
        .success-icon svg {
            width: 50px;
            height: 50px;
            color: white;
        }
        
        @keyframes scaleIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        
        .thank-you-title {
            font-size: 2rem;
            font-weight: 800;
            color: var(--black);
            margin-bottom: 0.5rem;
        }
        
        .thank-you-subtitle {
            font-size: 1.25rem;
            color: var(--gold-dark);
            font-weight: 600;
            margin-bottom: 1.5rem;
        }
        
        .thank-you-message {
            color: var(--gray);
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 2rem;
        }
        
        .order-info {
            background: var(--cream);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            text-align: right;
        }
        
        .order-info-title {
            font-weight: 700;
            color: var(--black);
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }
        
        .order-info-item {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }
        
        .order-info-item:last-child {
            border-bottom: none;
        }
        
        .order-info-label {
            color: var(--gray);
        }
        
        .order-info-value {
            font-weight: 600;
            color: var(--black);
        }
        
        .next-steps {
            background: linear-gradient(135deg, rgba(201, 162, 39, 0.1) 0%, rgba(201, 162, 39, 0.05) 100%);
            border: 1px solid rgba(201, 162, 39, 0.2);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .next-steps-title {
            font-weight: 700;
            color: var(--gold-dark);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .next-steps-list {
            text-align: right;
            color: var(--gray);
        }
        
        .next-steps-list li {
            padding: 0.5rem 0;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .step-number {
            width: 24px;
            height: 24px;
            background: var(--gold);
            color: var(--black);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            flex-shrink: 0;
        }
        
        .social-section {
            margin-bottom: 2rem;
        }
        
        .social-title {
            font-weight: 600;
            color: var(--black);
            margin-bottom: 1rem;
        }
        
        .social-buttons {
            display: flex;
            justify-content: center;
            gap: 1rem;
        }
        
        .social-btn-ty {
            width: 50px;
            height: 50px;
            background: var(--cream);
            border: 1px solid rgba(201, 162, 39, 0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold-dark);
            transition: var(--transition);
        }
        
        .social-btn-ty:hover {
            background: var(--gold);
            color: var(--black);
            transform: translateY(-3px);
        }
        
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--black);
            color: var(--white);
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: var(--transition);
        }
        
        .back-btn:hover {
            background: var(--gold);
            color: var(--black);
        }
        
        .brand-logo {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--gold);
            margin-bottom: 2rem;
            letter-spacing: 2px;
        }
        
        .confetti {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
        }
    </style>
</head>

    <script>
        // Simple confetti effect
        function createConfetti() {
            const confettiContainer = document.getElementById('confetti');
            const colors = ['#c9a227', '#22c55e', '#3b82f6', '#f59e0b', '#ec4899'];
            
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.style.cssText = `
                        position: absolute;
                        width: 10px;
                        height: 10px;
                        background: ${colors[Math.floor(Math.random() * colors.length)]};
                        left: ${Math.random() * 100}%;
                        top: -10px;
                        border-radius: ${Math.random() > 0.5 ? '50%' : '0'};
                        animation: fall ${2 + Math.random() * 2}s linear forwards;
                    `;
                    confettiContainer.appendChild(confetti);
                    
                    setTimeout(() => confetti.remove(), 4000);
                }, i * 50);
            }
        }
        
        // Add falling animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fall {
                to {
                    transform: translateY(100vh) rotate(720deg);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
        
        // Trigger confetti on load
        window.addEventListener('load', createConfetti);
    </script>
